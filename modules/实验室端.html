<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验室端全貌</title>
<style>:root {
  --bg: #0d1117; --bg2: #161b22; --card-bg: #1c2128; --card-border: #30363d;
  --text: #e6edf3; --text-dim: #8c99a8;
  --accent: #f78166; --blue: #58a6ff; --green: #3fb950;
  --orange: #d29922; --purple: #bc8cff; --cyan: #39c5cf; --red: #f85149;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh; line-height: 1.65;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px; background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 8px; color: var(--text-dim); font-size: 12px;
  text-decoration: none; margin: 20px 24px; transition: all 0.15s;
}
.back-link:hover { border-color: var(--accent); color: var(--accent); }
.breadcrumb { display: flex; align-items: center; gap: 8px; padding: 0 24px 16px; font-size: 11px; color: var(--text-dim); }
.breadcrumb a { color: var(--text-dim); text-decoration: none; }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb span { color: var(--card-border); }
.hero { padding: 0 24px 24px; }
.hero-icon { font-size: 36px; margin-bottom: 8px; }
.hero h1 { font-size: 24px; color: var(--text); margin-bottom: 4px; }
.hero .sub { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
.hero-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.meta-tag { font-size: 10px; padding: 3px 10px; border-radius: 8px; background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--card-border); }
.meta-tag.green { background: rgba(63,185,80,0.1); color: var(--green); border-color: rgba(63,185,80,0.2); }





.content { max-width: 820px; padding: 0 24px 60px; }
.section { margin-bottom: 28px; }
.section-title {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--card-border); display: flex; align-items: center; gap: 6px;
}
.section-title .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.card-head { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
.card-head:hover { background: rgba(255,255,255,0.02); }
.card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.card-meta { flex: 1; }
.card-meta h3 { font-size: 13px; color: var(--text); margin-bottom: 1px; }
.card-meta p { font-size: 10.5px; color: var(--text-dim); }
.card-arr { width: 20px; height: 20px; border-radius: 5px; background: var(--card-border); display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 9px; transition: transform 0.2s; flex-shrink: 0; }
.card.open .card-arr { transform: rotate(180deg); }
.card-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.card.open .card-body { max-height: 5000px; }
.card-body-in { padding: 0 16px 16px; }
.flow-diagram { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
.flow-node { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px 12px; font-size: 11px; text-align: center; min-width: 72px; }
.flow-node.hi { border-color: var(--accent); background: rgba(247,129,102,0.08); }
.flow-node .n-title { font-weight: bold; margin-bottom: 2px; font-size: 11.5px; }
.flow-node .n-sub { font-size: 9.5px; color: var(--text-dim); }
.flow-arrow { color: var(--text-dim); font-size: 14px; padding: 0 3px; }
.text-list { list-style: none; }
.text-list li { padding: 4px 0; font-size: 12px; line-height: 1.7; color: var(--text); display: flex; align-items: flex-start; gap: 7px; }
.text-list li::before { content: "·"; color: var(--accent); font-size: 15px; line-height: 1.3; flex-shrink: 0; }
.sub-item { color: var(--text-dim); font-size: 11px; margin-left: 16px; }
.sub-item::before { content: "→"; color: var(--text-dim); font-size: 11px; }
.type-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.type-card { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px 12px; }
.type-card .t { font-weight: bold; margin-bottom: 2px; font-size: 11.5px; }
.type-card .t.a { color: #f85149; } .type-card .t.b { color: var(--orange); }
.type-card .t.c { color: var(--purple); } .type-card .t.d { color: var(--blue); }
.type-card .desc { color: var(--text-dim); font-size: 10px; margin-bottom: 3px; }
.type-card .strategy { color: var(--green); font-size: 10px; }
.hi-box { background: rgba(57,197,207,0.08); border: 1px solid rgba(57,197,207,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--cyan); line-height: 1.75; margin-top: 10px; }
.hi-box.r { background: rgba(248,81,73,0.08); border-color: rgba(248,81,73,0.2); color: var(--red); }
.hi-box.o { background: rgba(210,153,34,0.08); border-color: rgba(210,153,34,0.2); color: var(--orange); }
.hi-box.g { background: rgba(63,185,80,0.08); border-color: rgba(63,185,80,0.2); color: var(--green); }
.hi-box.accent { background: rgba(247,129,102,0.08); border-color: rgba(247,129,102,0.2); color: var(--accent); }




.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.col-card { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px 14px; }
.col-card h5 { font-size: 11.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.col-card h5.in { color: var(--blue); }
.col-card h5.out { color: var(--purple); }
.col-card ul { list-style: none; }
.col-card li { padding: 3px 0; font-size: 11px; color: var(--text-dim); display: flex; align-items: flex-start; gap: 6px; }
.col-card li::before { content: "·"; color: var(--accent); font-size: 14px; line-height: 1.3; flex-shrink: 0; }
.divider { border: none; border-top: 1px solid var(--card-border); margin: 24px 0; }
.factor-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.factor-table th { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--card-border); }
.factor-table td { font-size: 11.5px; padding: 8px 12px; border-bottom: 1px solid rgba(48,54,61,0.5); color: var(--text); }
.factor-table td:first-child { font-weight: bold; }
.factor-table .cat { display: flex; align-items: center; gap: 6px; }
.factor-table .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.insight-box { background: rgba(57,197,207,0.06); border: 1px solid rgba(57,197,207,0.15); border-left: 3px solid var(--cyan); border-radius: 8px; padding: 10px 16px; font-size: 12px; color: var(--text); line-height: 1.75; margin-top: 12px; }
.insight-box.accent { border-left-color: var(--accent); background: rgba(247,129,102,0.05); }
.insight-box.orange { border-left-color: var(--orange); background: rgba(210,153,34,0.05); }
.insight-box.green { border-left-color: var(--green); background: rgba(63,185,80,0.05); }
.insight-box.red { border-left-color: var(--red); background: rgba(248,81,73,0.05); }
.insight-box .insight-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
@media (max-width: 768px) {
  .type-grid { grid-template-columns: 1fr 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .back-link { margin: 16px; }
  .breadcrumb { padding: 0 16px 12px; }
  .hero { padding: 0 16px 20px; }
  .content { padding: 0 16px 40px; }
}

/* ── Feedback Panel ── */
#feedback-panel { display: none; }
#feedback-panel.open { display: block; }
.feedback-panel {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; margin-top: 36px; overflow: hidden;
}
.feedback-panel-header {
  padding: 14px 20px; border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.feedback-panel-header-left { display: flex; align-items: center; gap: 10px; }
.feedback-panel-header .fp-icon { font-size: 15px; }
.feedback-panel-header .fp-title { font-size: 13px; font-weight: 600; color: var(--text); }
.feedback-panel-header .fp-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.fp-toggle {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--card-border); border: none;
  color: var(--text-dim); font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s; flex-shrink: 0;
}
.fp-toggle:hover { background: var(--accent); color: #fff; }
.feedback-panel-body { padding: 18px 20px; }
.fb-type-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.fb-type-btn {
  padding: 5px 13px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--card-border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all 0.15s;
}
.fb-type-btn:hover { border-color: var(--accent); color: var(--accent); }
.fb-type-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(247,129,102,0.1); }
.fb-field { margin-bottom: 10px; }
.fb-label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; display: block; }
.fb-textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--card-border);
  border-radius: 8px; color: var(--text); font-family: inherit;
  font-size: 13px; padding: 9px 13px; resize: vertical; min-height: 80px;
  outline: none; transition: border-color 0.2s; box-sizing: border-box;
}
.fb-textarea:focus { border-color: var(--accent); }
.fb-textarea::placeholder { color: var(--text-dim); opacity: 0.6; }
.fb-submit-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 12px; }
.fb-hint { font-size: 11px; color: var(--text-dim); }
.fb-submit {
  padding: 7px 18px; background: var(--accent); border: none;
  border-radius: 6px; color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.fb-submit:hover { opacity: 0.85; }
.fb-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.fb-result { margin-top: 10px; padding: 9px 13px; border-radius: 8px; font-size: 12px; line-height: 1.6; display: none; }
.fb-result.success { display: block; background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: var(--green); }
.fb-result.error { display: block; background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--red); }
.fb-result.info { display: block; background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3); color: var(--blue); }

</style>
</head>
<body>

<a href="../index.html" class="back-link">← 返回主知识图谱</a>

<div class="breadcrumb">
  <a href="../index.html">到家服务知识图谱</a>
  <span>/</span>
  <span>详尽模块</span>
  <span>/</span>
  <span style="color:var(--text)">实验室端全貌</span>
</div>

<div class="hero">
  <div class="hero-icon">🔬</div>
  <h1>实验室端全貌</h1>
  <div class="sub">样本检测全流程 · 质控体系 · 产能管理</div>
  <div class="hero-meta"><span class="meta-tag">实验室端</span><span class="meta-tag">检测流程</span><span class="meta-tag">质控体系</span><span class="meta-tag">产能管理</span></div>
</div>

</div>

  <hr class="divider">

  <div class="section">
    <div class="section-title"><span class="dot" style="background:var(--orange)"></span> 二、关键角色与职责</div>
    <ul class="text-list">
      <li><strong>实验室运营</strong>：样本接收、登记、分拣</li>
      <li><strong>检测技师</strong>：上机操作、试剂管理</li>
      <li><strong>质控审核</strong>：报告准确性校验、异常样本处理</li>
      <li><strong>配送管理</strong>：与骑手/护士端协调取送样时效</li>
    </ul>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-title"><span class="dot" style="background:var(--red)"></span> 三、与护士端的协同关键节点</div>
    <ul class="text-list">
      <li>关键矛盾点：护士采样后需立即呼叫运力，运力到位慢会导致护士等待</li>
      <li>优化方向：预测样本量 → 动态调整运力储备 → 减少护士等待时间</li>
    </ul>
  </div>

  <hr class="divider">

  <div class="section">
    

    <div class="card open">
      
      <div class="card-body"><div class="card-body-in">
        </div>
  </div>

  <div class="insight-box" style="border-left-color:var(--purple)">
    </div>

</div>

<script>


// ── Feedback System ──
let selectedFbType = '';
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xkokvpkn';
const MODULE_NAME = '实验室端';

function toggleFeedback() {
  var panel = document.getElementById('feedback-panel');
  var body = document.getElementById('fp-body');
  var btn = document.getElementById('fp-toggle-btn');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    body.style.display = 'none';
    btn.textContent = '+';
  } else {
    panel.classList.add('open');
    body.style.display = 'block';
    btn.textContent = '×';
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function selectFbType(btn) {
  document.querySelectorAll('.fb-type-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedFbType = btn.dataset.type;
  document.getElementById('fb-hint').textContent = '已选择：' + selectedFbType + ' · 填写完成后点击提交';
}

async function submitFeedback() {
    var fbType = document.getElementById('fb-type') ? document.getElementById('fb-type').value : '其他';
    var fbText = document.getElementById('fb-text') ? document.getElementById('fb-text').value : '';
    var moduleEl = document.getElementById('fb-module');
    var moduleName = moduleEl && moduleEl.value ? moduleEl.value : 'index';

    if (!fbText || !fbText.trim()) {
        var hint = document.getElementById('fb-hint');
        if (hint) { hint.textContent = '请输入反馈内容'; hint.style.color = '#e53e3e'; }
        return;
    }

    var submitBtn = document.getElementById('fb-submit');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '提交中...'; }

    try {
        var res = await fetch(FORMSPREE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
                '类型': fbType,
                '模块': moduleName,
                '页面': window.location.href,
                '反馈内容': fbText
            })
        });

        if (res.ok) {
            console.log('Feedback submitted successfully');
            showFeedbackSuccess();
        } else {
            var errText = '提交失败 (HTTP ' + res.status + ')';
            console.error(errText);
            var hint = document.getElementById('fb-hint');
            if (hint) { hint.textContent = errText; hint.style.color = '#e53e3e'; }
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '重新提交'; }
        }
    } catch(e) {
        console.error('Feedback submission error:', e);
        var hint = document.getElementById('fb-hint');
        if (hint) { hint.textContent = '网络错误，请检查网络后重试'; hint.style.color = '#e53e3e'; }
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '重新提交'; }
    }
}

function showFeedbackSuccess() {
    var result = document.getElementById('fb-result');
    if (!result) return;
    result.style.display = 'block';
    var form = document.getElementById('feedback-form');
    if (form) form.style.display = 'none';
    var hint = document.getElementById('fb-hint');
    if (hint) hint.style.display = 'none';
    var submitBtn = document.getElementById('fb-submit');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '已提交'; }
}

</script>

<div id="feedback-panel" class="feedback-panel">
    <div class="feedback-panel-header" onclick="toggleFeedback()">
      <div class="feedback-panel-header-left">
        <span class="fp-icon">💬</span>
        <div>
          <div class="fp-title">团队共创 · 反馈与建议</div>
          <div class="fp-sub"></div>
        </div>
      </div>
      <button class="fp-toggle" id="fp-toggle-btn">+</button>
    </div>
    <div class="feedback-panel-body" id="fp-body" style="display:none">
      <div class="fb-type-row" id="fb-type-row">
        <button class="fb-type-btn" data-type="错误报告" onclick="selectFbType(this)">🚦 错误报告</button>
        <button class="fb-type-btn" data-type="内容建议" onclick="selectFbType(this)">📕 内容建议</button>
        <button class="fb-type-btn" data-type="新功能提议" onclick="selectFbType(this)">🏣 新功能提议</button>
        <button class="fb-type-btn" data-type="讨论交流" onclick="selectFbType(this)">💡 讨论交流</button>
      </div>
      <div class="fb-field">
        <label class="fb-label">具体内容</label>
        <textarea class="fb-textarea" id="fb-text" placeholder="请描述您的反馈内容..."></textarea>
      </div>
      <div class="fb-submit-row">
        <span class="fb-hint" id="fb-hint">选择一个类型，填写内容后提交</span>
        <button class="fb-submit" id="fb-submit" onclick="submitFeedback()">提交反馈</button>
      </div>
      <div class="fb-result" id="fb-result"></div>
    </div>
  </div>

</main>

</body>
</html>
